# Diffusion Transformer + Flow Matching on cup_in_the_wild.zarr (1447 eps)
# Training from scratch — no pretrained UMI checkpoint exists for this arch.
# ViT-L/14 CLIP encoder outputs all 256 patch tokens (feature_aggregation: null)
# which the transformer cross-attends to for precise spatial conditioning.
#
# Run: python train.py --config-name=train_flow_transformer_cupwild

defaults:
  - _self_
  - task: umi_pick_place

name: flow_transformer_cupwild
_target_: diffusion_policy.workspace.train_diffusion_transformer_timm_workspace.TrainDiffusionTransformerTimmWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

n_action_steps: 8
n_emb: 1024   # must match ViT-L feature dim

policy:
  _target_: diffusion_policy.policy.diffusion_transformer_timm_flow_policy.DiffusionTransformerTimmFlowPolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.DDIMScheduler
    num_train_timesteps: 1000   # finer t discretization for flow matching
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon    # ignored at runtime; flow policy bypasses scheduler

  obs_encoder:
    _target_: diffusion_policy.model.vision.transformer_obs_encoder.TransformerObsEncoder
    shape_meta: ${shape_meta}
    model_name: 'vit_large_patch14_clip_224.openai'
    pretrained: True
    frozen: False
    global_pool: ''
    n_emb: ${n_emb}
    feature_aggregation: null   # use all 256 patch tokens (not just CLS)
    downsample_ratio: 32        # unused for ViT; kept for config compat
    transforms:
      - type: RandomCrop
        ratio: 0.95
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08
    use_group_norm: True
    share_rgb_model: False

  num_inference_steps: 10   # flow matching converges in far fewer steps than DDPM
  input_pertub: 0.1
  n_layer: 8
  n_head: 8       # 8 heads × 128 dim/head = 1024 (matches ViT-L)
  n_emb: ${n_emb}
  p_drop_attn: 0.1

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 16        # ViT-L with 256 tokens is memory heavy; adjust up if VRAM allows
  num_workers: 6
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 16
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-6
  obs_encoder_lr: 1.0e-5      # CLIP ViT-L is pretrained — keep LR small
  obs_encoder_weight_decay: 1.0e-6
  betas: [0.95, 0.999]

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 2000
  num_epochs: 100
  gradient_accumulate_every: 4   # effective batch = 16 × 4 = 64
  use_ema: True
  freeze_encoder: False
  rollout_every: 999999
  checkpoint_every: 5
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: umi_pick_place
  resume: False
  mode: online
  name: ${name}_${exp_name}
  tags: ["flow_matching", "transformer", "vit_l", "cupwild", "scratch"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_action_mse_error
    mode: min
    k: 2
    format_str: 'epoch={epoch:04d}-val_mse={val_action_mse_error:.4f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
