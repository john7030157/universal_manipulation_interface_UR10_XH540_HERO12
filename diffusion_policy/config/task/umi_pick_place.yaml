name: umi_pick_place

camera_obs_latency: 0.125
robot_obs_latency: 0.0001
gripper_obs_latency: 0.02
dataset_frequeny: 10  # Hz
obs_down_sample_steps: 3

low_dim_obs_horizon: 2  # Stanford's cup_wild_vit_l_1img.ckpt was trained with horizon=2 (cond_encoder input=1184)
img_obs_horizon: 1  # cup_wild was trained with a single image (1img in the ckpt name)
action_horizon: 16  # matches Stanford's pretrained weight structure; n_action_steps controls replanning cadence
ignore_proprioception: False

shape_meta: &shape_meta
  obs:
    camera0_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    robot0_eef_pos:
      shape: [3]
      horizon: ${task.low_dim_obs_horizon}
      latency_steps: ${eval:'round((${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny})'}
      down_sample_steps: ${task.obs_down_sample_steps}
      type: low_dim
      ignore_by_policy: ${task.ignore_proprioception}
    robot0_eef_rot_axis_angle:
      raw_shape: [3]
      shape: [6]
      horizon: ${task.low_dim_obs_horizon}
      latency_steps: ${eval:'round((${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny})'}
      down_sample_steps: ${task.obs_down_sample_steps}
      type: low_dim
      rotation_rep: rotation_6d
      ignore_by_policy: ${task.ignore_proprioception}
    robot0_gripper_width:
      shape: [1]
      horizon: ${task.low_dim_obs_horizon}
      latency_steps: ${eval:'round((${task.camera_obs_latency} - ${task.gripper_obs_latency}) * ${task.dataset_frequeny})'}
      down_sample_steps: ${task.obs_down_sample_steps}
      type: low_dim
      ignore_by_policy: ${task.ignore_proprioception}
    robot0_eef_rot_axis_angle_wrt_start:
      raw_shape: [3]
      shape: [6]
      horizon: ${task.low_dim_obs_horizon}
      latency_steps: ${eval:'round((${task.camera_obs_latency} - ${task.robot_obs_latency}) * ${task.dataset_frequeny})'}
      down_sample_steps: ${task.obs_down_sample_steps}
      type: low_dim
      rotation_rep: rotation_6d
      ignore_by_policy: ${task.ignore_proprioception}
  action:
    shape: [10]
    horizon: ${task.action_horizon}
    latency_steps: 0
    down_sample_steps: ${task.obs_down_sample_steps}
    rotation_rep: rotation_6d

task_name: &task_name umi_pick_place
# override on CLI: task.dataset_path=data/your_pick_place.zarr
dataset_path: zarrs/0430_replay_buffer.zarr
pose_repr: &pose_repr
  obs_pose_repr: relative
  action_pose_repr: relative

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: diffusion_policy.dataset.umi_dataset.UmiDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  cache_dir: data/dataset_cache
  pose_repr: *pose_repr
  action_padding: False
  temporally_independent_normalization: False
  repeat_frame_prob: 0.0
  seed: 42
  val_ratio: 0.05
